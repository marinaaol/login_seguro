<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registo - Nova Conta</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }
        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        .erro {
            color: #dc3545;
            margin-bottom: 10px;
        }
        .flash {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .flash-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .links {
            text-align: center;
            margin-top: 15px;
        }
        .links a {
            color: #007bff;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Criar Nova Conta</h2>
        
        {% if erros %}
            {% for erro in erros %}
                <div class="flash flash-error">{{ erro }}</div>
            {% endfor %}
        {% endif %}
        
        <form method="POST" action="{{ url_for('registo') }}">
            <div class="form-group">
                <label for="username">Username:*</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <!-- Nível 1 - Campos adicionais -->
            <div class="form-group">
                <label for="nome_completo">Nome Completo:</label>
                <input type="text" id="nome_completo" name="nome_completo">
            </div>
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
            </div>
            
            <div class="form-group">
                <label for="password">Password:*</label>
                <input type="password" id="password" name="password" required minlength="6">
            </div>
            
            <!-- Nível 2 - Confirmação de password -->
            <div class="form-group">
                <label for="confirmar_password">Confirmar Password:*</label>
                <input type="password" id="confirmar_password" name="confirmar_password" required>
            </div>
            
            <button type="submit">Registar</button>
        </form>
        
        <div class="links">
            <a href="{{ url_for('login') }}">Já tem conta? Faça login</a>
        </div>
    </div>
    
    <script>
        // Validação cliente-side para passwords coincidirem
        document.querySelector('form').addEventListener('submit', function(e) {
            var password = document.getElementById('password').value;
            var confirmar = document.getElementById('confirmar_password').value;
            
            if (password !== confirmar) {
                e.preventDefault();
                alert('As passwords não coincidem!');
            }
        });
    </script>
</body>
</html>
